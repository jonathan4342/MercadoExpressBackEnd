openapi: 3.0.3
info:
  title: MercadoExpress — API de Inventario
  version: 1.0.0
  description: >
    API REST de gestión de inventario (productos, ajustes de stock e historial de
    movimientos, alertas de stock bajo y órdenes de compra).

    Autenticación por JWT (Bearer). Solo `GET /health` y `POST /auth/token` son
    públicos; el resto de endpoints requieren el header
    `Authorization: Bearer <token>`.

servers:
  - url: http://localhost:3000/api
    description: Entorno local

tags:
  - name: Salud
  - name: Auth
  - name: Productos
  - name: Catálogos
  - name: Alertas
  - name: Órdenes

security:
  - bearerAuth: []

paths:
  /health:
    get:
      tags: [Salud]
      summary: Health check (público)
      security: []
      responses:
        '200':
          description: Servicio operativo
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }

  /auth/token:
    post:
      tags: [Auth]
      summary: Emitir token JWT (público)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
            example: { username: admin, password: Admin123* }
      responses:
        '200':
          description: Token emitido
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthToken' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /products:
    get:
      tags: [Productos]
      summary: Listar inventario (con filtros) — RF-06
      parameters:
        - { name: category, in: query, schema: { type: string }, description: Nombre de categoría }
        - { name: supplier, in: query, schema: { type: string }, description: Nombre de proveedor }
        - { name: activeAlert, in: query, schema: { type: boolean }, description: Solo productos con alerta activa }
        - { name: minStock, in: query, schema: { type: integer }, description: Stock actual mínimo }
        - { name: maxStock, in: query, schema: { type: integer }, description: Stock actual máximo }
      responses:
        '200':
          description: Lista de productos
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Product' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Productos]
      summary: Crear producto (el SKU lo genera la BD) — RF-01
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateProductRequest' }
            example: { name: Manzana Roja kg, categoryId: 5, price: 4200, currentStock: 50, minimumStock: 20, supplierId: 1 }
      responses:
        '201':
          description: Producto creado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /products/{uid}:
    put:
      tags: [Productos]
      summary: Actualizar datos del producto (no toca el stock) — RF-01
      parameters:
        - { name: uid, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateProductRequest' }
            example: { name: Manzana Roja Premium kg, categoryId: 5, price: 4800, minimumStock: 25, supplierId: 1 }
      responses:
        '200':
          description: Producto actualizado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /products/{uid}/adjustments:
    post:
      tags: [Productos]
      summary: Ajustar stock (entrada/salida) y registrar movimiento — RF-02
      description: >
        ENTRADA suma stock; SALIDA lo resta y nunca lo deja negativo
        (si la cantidad supera el stock actual responde 422). Cada ajuste
        registra un movimiento en el historial y puede disparar/resolver una
        alerta de stock bajo (RF-03).
      parameters:
        - { name: uid, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/StockAdjustmentRequest' }
            examples:
              entrada:
                summary: Entrada de mercadería
                value: { type: ENTRADA, quantity: 100, reason: Reposición de bodega }
              salida:
                summary: Salida de mercadería
                value: { type: SALIDA, quantity: 35, reason: Venta mostrador }
      responses:
        '201':
          description: Ajuste aplicado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdjustStockResult' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/InsufficientStock' }

  /products/{uid}/movements:
    get:
      tags: [Productos]
      summary: Historial de movimientos del producto — RF-02
      parameters:
        - { name: uid, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Movimientos del producto (más recientes primero)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Movement' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /categories:
    get:
      tags: [Catálogos]
      summary: Listar categorías (para selects del front)
      responses:
        '200':
          description: Categorías
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/CatalogItem' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /suppliers:
    get:
      tags: [Catálogos]
      summary: Listar proveedores (para selects del front)
      responses:
        '200':
          description: Proveedores
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/CatalogItem' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /alerts:
    get:
      tags: [Alertas]
      summary: Listar alertas de stock bajo — RF-03
      parameters:
        - { name: status, in: query, schema: { type: string, enum: [ACTIVA, RESUELTA] } }
      responses:
        '200':
          description: Alertas
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Alert' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /orders:
    get:
      tags: [Órdenes]
      summary: Listar órdenes de compra — RF-04, RF-05
      parameters:
        - { name: status, in: query, schema: { type: string, enum: [PENDIENTE, APROBADA, RECHAZADA, RECIBIDA] } }
      responses:
        '200':
          description: Órdenes
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Order' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Órdenes]
      summary: Crear orden de compra — RF-04
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateOrderRequest' }
            example: { productUid: 00000000-0000-0000-0000-000000000000, quantity: 40, alertUid: null }
      responses:
        '201':
          description: Orden creada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Order' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /orders/{uid}/approve:
    patch:
      tags: [Órdenes]
      summary: Aprobar orden — RF-05
      parameters:
        - { name: uid, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Orden aprobada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Order' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /orders/{uid}/reject:
    patch:
      tags: [Órdenes]
      summary: Rechazar orden (con motivo) — RF-05
      parameters:
        - { name: uid, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string, example: Proveedor sin disponibilidad }
      responses:
        '200':
          description: Orden rechazada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Order' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /orders/{uid}/receive:
    patch:
      tags: [Órdenes]
      summary: Marcar orden como recibida (suma stock) — RF-05
      parameters:
        - { name: uid, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Orden recibida
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Order' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    Unauthorized:
      description: Falta el token o es inválido
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { error: UnauthorizedError, message: "Token requerido: use el header 'Authorization: Bearer <token>'." }
    ValidationError:
      description: Datos de entrada inválidos
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { error: ValidationError, message: "El campo 'name' es obligatorio." }
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { error: NotFoundError, message: "Producto no encontrado." }
    Conflict:
      description: Conflicto con el estado actual del recurso
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { error: ConflictError, message: "La orden no está en un estado que permita esta operación." }
    InsufficientStock:
      description: La salida dejaría el stock en negativo
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { error: InsufficientStockError, message: "Stock insuficiente: disponible 10, solicitado 35." }

  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string, example: admin }
        password: { type: string, format: password, example: Admin123* }

    AuthToken:
      type: object
      properties:
        accessToken: { type: string }
        tokenType: { type: string, example: Bearer }
        expiresIn: { type: integer, description: Segundos de validez, example: 3600 }

    Product:
      type: object
      properties:
        uid: { type: string, format: uuid }
        sku: { type: string, example: PRD-0001 }
        name: { type: string }
        categoryId: { type: integer }
        category: { type: string }
        price: { type: number }
        currentStock: { type: integer }
        minimumStock: { type: integer }
        supplierId: { type: integer }
        supplier: { type: string }
        belowMinimum: { type: boolean }

    CreateProductRequest:
      type: object
      required: [name, categoryId, price, minimumStock, supplierId]
      properties:
        name: { type: string, minLength: 3, maxLength: 100 }
        categoryId: { type: integer, description: ID de categoría (select del front) }
        price: { type: number, description: Mayor a 0 }
        currentStock: { type: integer, minimum: 0, description: Opcional; por defecto 0 }
        minimumStock: { type: integer, minimum: 1 }
        supplierId: { type: integer, description: ID de proveedor (select del front) }

    UpdateProductRequest:
      type: object
      required: [name, categoryId, price, minimumStock, supplierId]
      properties:
        name: { type: string, minLength: 3, maxLength: 100 }
        categoryId: { type: integer }
        price: { type: number }
        minimumStock: { type: integer, minimum: 1 }
        supplierId: { type: integer }

    StockAdjustmentRequest:
      type: object
      required: [type, quantity, reason]
      properties:
        type: { type: string, enum: [ENTRADA, SALIDA] }
        quantity: { type: integer, minimum: 1, description: Entero mayor a 0 }
        reason: { type: string, description: Motivo obligatorio }

    AdjustStockResult:
      type: object
      properties:
        product: { $ref: '#/components/schemas/Product' }
        movement: { $ref: '#/components/schemas/Movement' }
        alert:
          allOf:
            - $ref: '#/components/schemas/Alert'
          nullable: true
          description: Alerta activa del producto tras el ajuste, o null

    Movement:
      type: object
      properties:
        uid: { type: string, format: uuid, nullable: true }
        type: { type: string, enum: [ENTRADA, SALIDA] }
        quantity: { type: integer }
        reason: { type: string }
        stockAfter: { type: integer, description: Stock resultante tras el movimiento }
        createdAt: { type: string, format: date-time, nullable: true }

    Alert:
      type: object
      properties:
        uid: { type: string, format: uuid }
        productId: { type: integer }
        productUid: { type: string, format: uuid }
        type: { type: string, example: STOCK_BAJO }
        status: { type: string, enum: [ACTIVA, RESUELTA] }
        createdAt: { type: string, format: date-time }
        resolvedAt: { type: string, format: date-time, nullable: true }

    CreateOrderRequest:
      type: object
      required: [productUid, quantity]
      properties:
        productUid: { type: string, format: uuid }
        quantity: { type: integer, minimum: 1 }
        alertUid: { type: string, format: uuid, nullable: true }

    Order:
      type: object
      properties:
        uid: { type: string, format: uuid }
        productId: { type: integer }
        productUid: { type: string, format: uuid }
        supplierId: { type: integer }
        supplier: { type: string }
        alertId: { type: integer, nullable: true }
        quantity: { type: integer }
        status: { type: string, enum: [PENDIENTE, APROBADA, RECHAZADA, RECIBIDA] }
        rejectionReason: { type: string, nullable: true }
        createdAt: { type: string, format: date-time, nullable: true }
        approvedAt: { type: string, format: date-time, nullable: true }
        receivedAt: { type: string, format: date-time, nullable: true }

    CatalogItem:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }

    Error:
      type: object
      properties:
        error: { type: string, description: Nombre del error de dominio }
        message: { type: string }
